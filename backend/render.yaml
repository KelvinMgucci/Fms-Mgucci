services:
  - type: web
    name: fms-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: "bash build.sh"
    startCommand: "gunicorn core.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.0
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      # Update these two to match the service name/frontend domain you actually deploy with.
      - key: ALLOWED_HOSTS
        value: fms-backend.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://fms-backend.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://your-frontend.vercel.app
      - key: DATABASE_URL
        fromDatabase:
          name: fms-db
          property: connectionString

databases:
  - name: fms-db
    plan: free
    databaseName: fms_db
    user: fms_user
